services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: backend/.env
    environment:
      POSTGRES_DB:       ${DB_NAME:-repoinsight}
      POSTGRES_USER:     ${DB_USER:-repoinsight}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-repoinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-repoinsight}"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    env_file: backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_HOST:   postgres
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A core worker --loglevel=info --concurrency=2
    env_file: backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      DB_HOST:   postgres
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - django
    restart: unless-stopped

volumes:
  postgres_data: